services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docuquery-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: docuquery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docuquery"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuquery-net

  redis:
    image: redis:7-alpine
    container_name: docuquery-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuquery-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuquery-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/docuquery}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your-key-here}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-me}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - docuquery-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuquery-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - docuquery-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  docuquery-net:
    driver: bridge
